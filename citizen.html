        function setLanguage(lang) {
            localStorage.setItem('ems-lang', lang);
            document.getElementById('language-select').value = lang;
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[lang] && translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
            if (lang === 'hi') {
                document.getElementById('reg-name').placeholder = "राम कुमार";
                document.getElementById('reg-address').placeholder = "सेक्टर 2, भुवनेश्वर";
            } else if (lang === 'or') {
                document.getElementById('reg-name').placeholder = "ରାମ କୁମାର";
                document.getElementById('reg-address').placeholder = "ସେକ୍ଟର ୨, ଭୁବନେଶ୍ୱର";
            } else {
                document.getElementById('reg-name').placeholder = "John Doe";
                document.getElementById('reg-address').placeholder = "Sector 2, Niladri Vihar, Bhubaneswar";
            }
        }

        document.getElementById('language-select').addEventListener('change', (e) => {
            setLanguage(e.target.value);

            statusBanner.classList.add('hidden');

            if (mode === 'register') {
                regBtn.className = "flex-1 pb-3 border-b-2 border-blue-600 dark:border-blue-500 text-blue-700 dark:text-blue-400 uppercase text-center font-black tracking-wider text-xs transition-colors";
                signBtn.className = "flex-1 pb-3 border-b-2 border-transparent text-gray-500 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 uppercase text-center font-bold tracking-wider text-xs transition-colors";
                regFields.classList.remove('hidden');
            } else {
                signBtn.className = "flex-1 pb-3 border-b-2 border-blue-600 dark:border-blue-500 text-blue-700 dark:text-blue-400 uppercase text-center font-black tracking-wider text-xs transition-colors";
                regBtn.className = "flex-1 pb-3 border-b-2 border-transparent text-gray-500 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 uppercase text-center font-bold tracking-wider text-xs transition-colors";
                regFields.classList.add('hidden');
            }
        }

        document.getElementById('tab-btn-register').addEventListener('click', () => switchAuthTab('register'));
        document.getElementById('tab-btn-signin').addEventListener('click', () => switchAuthTab('signin'));

        // =====================================================================
        // PHONE AUTHENTICATION PIPELINE
        // =====================================================================
        document.getElementById('action-btn-trigger').addEventListener('click', () => {
            let rawPhoneNumber = document.getElementById('global-phone-input').value.trim().replace(/\s+/g, '');

            if (!rawPhoneNumber) {
                showMessage("Mobile number is required.");
                return;
            }

            // Auto-append +91 country code prefix if missing
            if (!rawPhoneNumber.startsWith('+')) {
                if (rawPhoneNumber.startsWith('0')) {
                    rawPhoneNumber = rawPhoneNumber.substring(1);
                }
                rawPhoneNumber = '+91' + rawPhoneNumber;
            }

            const phoneNumber = rawPhoneNumber;

            if (currentMode === 'register') {
                const name = document.getElementById('reg-name').value.trim();
                const dob = document.getElementById('reg-dob').value.trim();
                const address = document.getElementById('reg-address').value.trim();
                
                if (!name || !dob || !address) {
                    showMessage("All registration profile fields are mandatory.");
                    return;
                }
            }

            // Secure Invisible ReCaptcha Injection
            if (!recaptchaInstance) {
                try {
                    recaptchaInstance = new RecaptchaVerifier(auth, 'recaptcha-container', {
                        'size': 'invisible'
                    });
                } catch (e) {
                    console.error("reCAPTCHA configuration error:", e);
                    showMessage("Security initialization error. Please refresh and try again.");
                    return;
                }
            }

            showMessage("Encrypting and requesting telecom gateway...", false);

            signInWithPhoneNumber(auth, phoneNumber, recaptchaInstance)
                .then((confirmationResult) => {
                    confirmationResultGlobal = confirmationResult;
                    showMessage("Transmission successful. Input secure OTP below.", false);
            
                    document.getElementById('otp-block').classList.remove('hidden');
                    document.getElementById('action-btn-trigger').classList.add('hidden');
                    document.getElementById('verify-btn-trigger').classList.remove('hidden');
                }).catch((error) => {
                    if (recaptchaInstance) {
                        recaptchaInstance.clear();
                        recaptchaInstance = null;
                    }
                    showMessage(`Telecom Delivery Failed: ${error.message}`);
                });
        });

        document.getElementById('verify-btn-trigger').addEventListener('click', async () => {
            const code = document.getElementById('otp-code-input').value.trim();
            const btn = document.getElementById('verify-btn-trigger');
            
            if (!code) { showMessage("Verification token is required."); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Verifying...';

            try {
                const result = await confirmationResultGlobal.confirm(code);
                const user = result.user;

                if (currentMode === 'register') {
                    const fullName = document.getElementById('reg-name').value.trim();
                    const dob = document.getElementById('reg-dob').value.trim();
                    const address = document.getElementById('reg-address').value.trim();

                    // Schema matches exact verified architecture bounds
                    await setDoc(doc(db, "registered_citizens", user.uid), {
                        name: fullName,
                        dob: dob,
                        address: address,
                        phoneNumber: user.phoneNumber,
                        registeredAt: new Date().toISOString()
                    });
                    
                    showMessage("Identity matrix finalized! Booting console...", false);
                } else {
                    const profileCheck = await getDoc(doc(db, "registered_citizens", user.uid));
                    if (!profileCheck.exists()) {
                        showMessage("Identity missing. Please utilize the Registration pathway.");
                        await user.delete();
                        btn.disabled = false;
                        btn.innerText = "Verify Secure Token";
                        return;
                    }
                    showMessage("Clearance granted. Routing to Dispatch...", false);
                }

                setTimeout(() => { window.location.replace('report.html'); }, 1500);
            } catch (error) {
                showMessage(`Authentication rejected: ${error.message}`);
                btn.disabled = false;
                btn.innerText = "Verify Secure Token";
            }
        });

        // Demo Bypass Logic
        document.getElementById('bypass-demo-btn').addEventListener('click', async () => {
            const bypassBtn = document.getElementById('bypass-demo-btn');
            bypassBtn.disabled = true;
            const originalHTML = bypassBtn.innerHTML;
            bypassBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Bypassing...';
            showMessage("Bypassing portal as Demo Citizen...", false);
            const email = "democitizen@gmail.com";
            const password = "123456";
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                const docSnap = await getDoc(doc(db, "registered_citizens", user.uid));
                if (!docSnap.exists()) {
                    await setDoc(doc(db, "registered_citizens", user.uid), {
                        uid: user.uid,
                        name: "Demo Citizen",
                        dob: "2000-01-01",
                        address: "Bhubaneswar Sector 5",
                        phoneNumber: "+919999999999",
                        role: "citizen",
                        registeredAt: new Date().toISOString()
                    });
                }
                showMessage("Access Authorized. Logged in as Demo Citizen! Redirecting...", false);
                setTimeout(() => { window.location.replace('report.html'); }, 1200);
            } catch (e) {
                if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                    try {
                        const cred = await createUserWithEmailAndPassword(auth, email, password);
                        const user = cred.user;
                        await setDoc(doc(db, "registered_citizens", user.uid), {
                            uid: user.uid,
                            name: "Demo Citizen",
                            dob: "2000-01-01",
                            address: "Bhubaneswar Sector 5",
                            phoneNumber: "+919999999999",
                            role: "citizen",
                            registeredAt: new Date().toISOString()
                        });
                        showMessage("Access Authorized. Logged in as Demo Citizen! Redirecting...", false);
                        setTimeout(() => { window.location.replace('report.html'); }, 1200);
                    } catch (err) {
                        showMessage("Bypass Error: " + err.message);
                        bypassBtn.disabled = false;
                        bypassBtn.innerHTML = originalHTML;
                    }
                } else {
                    showMessage("Bypass Error: " + e.message);
                    bypassBtn.disabled = false;
                    bypassBtn.innerHTML = originalHTML;
                }
            }
        });
    </script>
</body>
