<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Portal - Environmental Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        
        // Prevent layout/theme flicker by checking local storage before render
        (function() {
            const savedTheme = localStorage.getItem('ems-theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
            } else {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#0b0f19] text-gray-800 dark:text-slate-100 min-h-screen flex flex-col justify-between selection:bg-blue-500/30 selection:text-blue-200 transition-colors duration-300">

    <header class="w-full bg-white/85 dark:bg-gray-950/85 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 px-4 md:px-6 py-3.5 flex justify-between items-center shadow-sm sticky top-0 z-50 transition-all duration-300">
        <a href="index.html" class="flex items-center space-x-2.5 text-gray-800 dark:text-white hover:opacity-90 transition">
            <div class="bg-gradient-to-tr from-cyan-600 to-blue-500 p-2 rounded-lg shadow-md shadow-cyan-500/10 flex items-center justify-center">
                <i class="fa-solid fa-truck-fast text-white text-xs md:text-sm"></i>
            </div>
            <div class="flex flex-col">
                <span class="font-black tracking-widest text-sm md:text-base uppercase leading-none text-gray-950 dark:text-white">EMS</span>
                <span class="text-[8px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest leading-none mt-0.5 font-sans">Air Quality Management</span>
            </div>
        </a>
        
        <div class="flex items-center space-x-3 md:space-x-4">
            <a href="index.html" class="text-[10px] md:text-xs font-bold tracking-wider text-gray-600 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-cyan-400 uppercase transition-colors flex items-center bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 px-3 py-1.5 rounded-lg shadow-sm">
                <i class="fa-solid fa-house mr-1.5 text-xs text-cyan-600 dark:text-cyan-400"></i><span>Home</span>
            </a>
            <div class="h-4 w-px bg-gray-200 dark:bg-gray-800"></div>
            <button id="theme-toggle-btn" class="w-8 h-8 rounded-lg border border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 text-gray-500 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-cyan-400 hover:border-cyan-500 transition-all duration-200 flex items-center justify-center shadow-sm" title="Toggle Theme">
                <i class="fa-solid fa-moon text-xs" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <div id="loading-overlay" class="fixed inset-0 bg-gray-50 dark:bg-[#0b0f19] flex flex-col justify-center items-center z-50 transition-opacity duration-300">
        <div class="relative flex items-center justify-center">
            <div class="w-16 h-16 border-2 border-gray-200 dark:border-slate-800 rounded-full"></div>
            <div class="w-16 h-16 border-t-2 border-cyan-600 dark:border-cyan-500 rounded-full animate-spin absolute top-0 left-0"></div>
            <i class="fa-solid fa-truck-fast text-gray-400 dark:text-slate-600 text-lg absolute"></i>
        </div>
        <div class="text-xs font-semibold tracking-widest text-gray-500 dark:text-slate-400 uppercase mt-6 animate-pulse">
            Checking Crew Status...
        </div>
    </div>

    <main class="flex-1 flex flex-col justify-center items-center px-4 py-12 relative overflow-hidden">
        <div class="absolute w-[500px] h-[500px] bg-gradient-to-tr from-cyan-600/10 to-transparent rounded-full blur-3xl -top-40 -left-40 pointer-events-none"></div>
        <div class="absolute w-[500px] h-[500px] bg-gradient-to-bl from-blue-600/5 to-transparent rounded-full blur-3xl -bottom-40 -right-40 pointer-events-none"></div>

        <section class="max-w-md w-full bg-white dark:bg-[#0d1424] border border-gray-200 dark:border-slate-800 rounded-xl p-8 shadow-2xl relative z-10 transition-colors">
            
            <div class="text-center pb-6 border-b border-gray-200 dark:border-slate-800/60 mb-6">
                <div class="inline-flex items-center justify-center px-2.5 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-[10px] font-bold text-cyan-600 dark:text-cyan-400 uppercase tracking-widest mb-3">
                    Field Crew Portal
                </div>
                <h3 class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">Crew Login</h3>
                <p class="text-xs text-gray-500 dark:text-slate-400 mt-1.5 leading-relaxed">Sign in with your crew account credentials to view assigned dispatch incidents.</p>
            </div>

            <div id="status-banner" class="hidden text-xs p-3 rounded-lg font-medium tracking-wide mb-5 flex items-center space-x-2.5"></div>

            <!-- Bypass Login Button (FOR DEMO) -->
            <button type="button" id="bypass-demo-btn" class="w-full bg-gradient-to-r from-purple-600 via-blue-600 to-cyan-600 hover:from-purple-500 hover:via-blue-500 hover:to-cyan-500 text-white font-bold text-xs tracking-widest uppercase py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/10 active:scale-[0.99] transition-all flex items-center justify-center gap-2 mb-6">
                <i class="fa-solid fa-wand-magic-sparkles animate-pulse"></i> Bypass Login (FOR DEMO)
            </button>

            <div class="flex bg-gray-100 dark:bg-[#080d1a] p-1 rounded-lg border border-gray-200 dark:border-slate-800/80 mb-6">
                <button id="tab-btn-signin" onclick="switchAuthTab('signin')" class="flex-1 py-2 rounded-md text-xs font-semibold tracking-wide transition-all duration-150 uppercase text-center bg-cyan-600 text-white shadow-lg shadow-cyan-600/10">
                    Sign In
                </button>
                <button id="tab-btn-register" onclick="switchAuthTab('register')" class="flex-1 py-2 rounded-md text-xs font-semibold tracking-wide transition-all duration-150 uppercase text-center text-gray-500 dark:text-slate-400 hover:text-gray-800 dark:hover:text-slate-200">
                    Register Account
                </button>
            </div>

            <form id="auth-form" class="space-y-4" onsubmit="handleAuthSubmit(event)">
                
                <div id="registration-fields" class="hidden space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold tracking-wider text-gray-600 dark:text-slate-400 uppercase mb-1.5">Crew Name</label>
                        <div class="relative">
                            <i class="fa-solid fa-people-group absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 text-xs"></i>
                            <input type="text" id="input-name" class="w-full bg-gray-50 dark:bg-[#080d1a] border border-gray-300 dark:border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-xs text-gray-800 dark:text-white focus:outline-none focus:border-cyan-600 dark:focus:border-cyan-500 transition-colors placeholder-gray-400 dark:placeholder-slate-600" placeholder="e.g., Anti-Smog Crew 3">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold tracking-wider text-gray-600 dark:text-slate-400 uppercase mb-1.5">Unit Specialization</label>
                        <div class="relative">
                            <i class="fa-solid fa-gear absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 text-xs"></i>
                            <select id="input-crewtype" class="w-full bg-gray-50 dark:bg-[#080d1a] border border-gray-300 dark:border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-xs text-gray-800 dark:text-white focus:outline-none focus:border-cyan-600 dark:focus:border-cyan-500 transition-colors">
                                <option value="CLEANUP_CREW">Anti-Smog / Cleanup Crew</option>
                                <option value="MIST_CANNON">Water-Mist Cannon Unit</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold tracking-wider text-gray-600 dark:text-slate-400 uppercase mb-1.5">Operational Zone Support</label>
                        <div class="relative">
                            <i class="fa-solid fa-map-pin absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 text-xs"></i>
                            <select id="input-zone" class="w-full bg-gray-50 dark:bg-[#080d1a] border border-gray-300 dark:border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-xs text-gray-800 dark:text-white focus:outline-none focus:border-cyan-600 dark:focus:border-cyan-500 transition-colors">
                                <option value="ALL">All Locations</option>
                                <option value="Niladri Vihar">Niladri Vihar</option>
                                <option value="Sailashree Vihar">Sailashree Vihar</option>
                                <option value="Rail Vihar">Rail Vihar</option>
                                <option value="District Center">District Center</option>
                                <option value="Infocity">Infocity</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold tracking-wider text-gray-600 dark:text-slate-400 uppercase mb-1.5">Email Address</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 text-xs"></i>
                        <input type="email" id="input-email" required class="w-full bg-gray-50 dark:bg-[#080d1a] border border-gray-300 dark:border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-xs text-gray-800 dark:text-white focus:outline-none focus:border-cyan-600 dark:focus:border-cyan-500 transition-colors placeholder-gray-400 dark:placeholder-slate-600" placeholder="crew3@municipality.gov">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold tracking-wider text-gray-600 dark:text-slate-400 uppercase mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-key absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 text-xs"></i>
                        <input type="password" id="input-password" required class="w-full bg-gray-50 dark:bg-[#080d1a] border border-gray-300 dark:border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-xs text-gray-800 dark:text-white focus:outline-none focus:border-cyan-600 dark:focus:border-cyan-500 transition-colors placeholder-gray-400 dark:placeholder-slate-600" placeholder="••••••••••••">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold text-xs tracking-widest uppercase py-3 rounded-lg mt-2 transition-all duration-150 shadow-lg shadow-cyan-500/10 hover:shadow-cyan-500/20 active:scale-[0.99]">
                    Log In
                </button>
            </form>
        </section>
    </main>

    <footer class="bg-white dark:bg-gray-950 border-t border-gray-200 dark:border-gray-800 transition-colors duration-300 w-full shrink-0">
        <div class="max-w-7xl mx-auto px-4 py-3 md:py-6 flex flex-col md:flex-row md:justify-between md:items-center gap-3 md:gap-6 text-xs text-gray-500 dark:text-gray-400">
            <div class="hidden md:flex items-center space-x-3">
                <div class="bg-blue-50 dark:bg-gray-900 p-1.5 rounded-lg border border-blue-100 dark:border-gray-800">
                    <i class="fa-solid fa-satellite-dish text-blue-600 dark:text-blue-400 text-sm"></i>
                </div>
                <div>
                    <span class="font-black tracking-widest uppercase text-gray-900 dark:text-white">EMS</span>
                    <span class="block text-[9px] text-gray-400 dark:text-gray-500 uppercase tracking-wider font-semibold">Air Quality Management</span>
                </div>
            </div>
            
            <div class="flex flex-wrap justify-center gap-x-4 sm:gap-x-6 gap-y-1.5 font-bold uppercase tracking-wider text-[9px] w-full md:w-auto">
                <a href="index.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center gap-1.5"><i class="fa-solid fa-house"></i> Home</a>
                <a href="maps.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center gap-1.5"><i class="fa-solid fa-map-location-dot"></i> Live Map</a>
                <a href="citizen.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center gap-1.5"><i class="fa-solid fa-user-astronaut"></i> Report</a>
                <a href="crew_login.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center gap-1.5"><i class="fa-solid fa-truck-fast"></i> Crew</a>
                <a href="gov.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center gap-1.5"><i class="fa-solid fa-building-shield"></i> Official</a>
            </div>
            
            <div class="hidden md:flex font-mono text-[9px] text-gray-400 dark:text-gray-600 uppercase tracking-widest items-center gap-1.5">
                <i class="fa-solid fa-shield-halved text-emerald-500 dark:text-emerald-600"></i> Authorized Access Only
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMzuLbJvBKf7Ivxtd6FbWDYp_hV0GD1TM",
            authDomain: "void-501114.firebaseapp.com",
            projectId: "void-501114",
            storageBucket: "void-501114.firebasestorage.app",
            messagingSenderId: "715581482123",
            appId: "1:715581482123:web:abc16633b73f2934a4208e",
            measurementId: "G-G9DRGJCSF7"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "clean");
        const auth = getAuth(app);

        let currentMode = "signin";

        // UI & THEME TOGGLE ENGINE
        const htmlElement = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');

        if (htmlElement.classList.contains('dark') && themeIcon) {
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('ems-theme', isDark ? 'dark' : 'light');
            if (isDark) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        });

        // state watcher
        onAuthStateChanged(auth, async (user) => {
            const overlay = document.getElementById('loading-overlay');
            if (user) {
                try {
                    const docRef = doc(db, "dispatch_crews", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        showMessage("Crew credentials authenticated. Redirecting...", false);
                        setTimeout(() => { 
                            window.location.replace('crew.html'); 
                        }, 1200);
                    } else {
                        await signOut(auth);
                        showMessage("Access Denied: Account is not registered as a field crew.");
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.classList.add('hidden'), 300);
                    }
                } catch (error) {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            } else {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        });

        window.showMessage = function(message, isError = true) {
            const banner = document.getElementById('status-banner');
            banner.classList.remove('hidden', 'bg-red-500/10', 'text-red-600', 'text-red-400', 'border-red-500/20', 'bg-emerald-500/10', 'text-emerald-600', 'text-emerald-400', 'border-emerald-500/20');
            
            if (isError) {
                banner.className = "text-xs p-3 rounded-lg font-medium tracking-wide mb-5 flex items-center space-x-2.5 bg-red-500/10 text-red-600 dark:text-red-400 border border-red-500/20";
                banner.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><span>${message}</span>`;
            } else {
                banner.className = "text-xs p-3 rounded-lg font-medium tracking-wide mb-5 flex items-center space-x-2.5 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20";
                banner.innerHTML = `<i class="fa-solid fa-circle-check"></i><span>${message}</span>`;
            }
        };

        window.switchAuthTab = function(authType) {
            currentMode = authType;
            const signInButton = document.getElementById('tab-btn-signin');
            const registerButton = document.getElementById('tab-btn-register');
            const regFields = document.getElementById('registration-fields');
            const submitBtn = document.getElementById('submit-btn');
            
            if (authType === 'signin') {
                signInButton.className = "flex-1 py-2 rounded-md text-xs font-semibold tracking-wide transition-all duration-150 uppercase text-center bg-cyan-600 text-white shadow-lg shadow-cyan-600/10";
                registerButton.className = "flex-1 py-2 rounded-md text-xs font-semibold tracking-wide transition-all duration-150 uppercase text-center text-gray-500 dark:text-slate-400 hover:text-gray-800 dark:hover:text-slate-200";
                regFields.classList.add('hidden');
                submitBtn.innerText = "Log In";
            } else {
                registerButton.className = "flex-1 py-2 rounded-md text-xs font-semibold tracking-wide transition-all duration-150 uppercase text-center bg-cyan-600 text-white shadow-lg shadow-cyan-600/10";
                signInButton.className = "flex-1 py-2 rounded-md text-xs font-semibold tracking-wide transition-all duration-150 uppercase text-center text-gray-500 dark:text-slate-400 hover:text-gray-800 dark:hover:text-slate-200";
                regFields.classList.remove('hidden');
                submitBtn.innerText = "Register Account";
            }
        };

        window.handleAuthSubmit = async function(e) {
            e.preventDefault();
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;

            try {
                if (currentMode === 'signin') {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    const docRef = doc(db, "dispatch_crews", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        showMessage("Access Authorized. Redirecting to Crew Dashboard...", false);
                        setTimeout(() => { window.location.replace('crew.html'); }, 1000);
                    } else {
                        await signOut(auth);
                        showMessage("Access Denied: Account is not registered as a field crew.");
                    }

                } else {
                    const name = document.getElementById('input-name').value;
                    const crewType = document.getElementById('input-crewtype').value;
                    const operationalZone = document.getElementById('input-zone').value;

                    if (!name || !crewType || !operationalZone) {
                        showMessage("All fields are required for registration.");
                        return;
                    }

                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // Storing crew details explicitly
                    await setDoc(doc(db, "dispatch_crews", user.uid), {
                        crewId: user.uid,
                        crewName: name,
                        crewType: crewType,
                        operationalZone: operationalZone,
                        email: email,
                        status: "OFFLINE",
                        latitude: 20.296,
                        longitude: 85.824,
                        assignedIncident: null,
                        lastActive: new Date().toISOString()
                    });

                    showMessage("Crew registered successfully. Redirecting...", false);
                    setTimeout(() => { window.location.replace('crew.html'); }, 1000);
                }
            } catch (error) {
                let friendlyError = error.message;
                if (error.code === 'auth/invalid-credential') friendlyError = "Invalid unit credentials.";
                if (error.code === 'auth/email-already-in-use') friendlyError = "Email is already assigned to a crew.";
                showMessage(`Authentication Rejected: ${friendlyError}`);
            }
        };

        // Demo Bypass Logic
        document.getElementById('bypass-demo-btn').addEventListener('click', async () => {
            const bypassBtn = document.getElementById('bypass-demo-btn');
            const originalHTML = bypassBtn.innerHTML;
            bypassBtn.disabled = true;
            bypassBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Bypassing...`;
            showMessage("Logging in as Demo Crew...", false);
            const email = "crew@gmail.com";
            const password = "123456";
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                const docSnap = await getDoc(doc(db, "dispatch_crews", user.uid));
                if (!docSnap.exists()) {
                    await setDoc(doc(db, "dispatch_crews", user.uid), {
                        crewId: user.uid,
                        crewName: "Anti-Smog Crew 3",
                        crewType: "CLEANUP_CREW",
                        operationalZone: "ALL",
                        email: email,
                        status: "OFFLINE",
                        latitude: 20.296,
                        longitude: 85.824,
                        assignedIncident: null,
                        lastActive: new Date().toISOString()
                    });
                }
                showMessage("Logged in as Demo Crew. Redirecting...", false);
                setTimeout(() => { window.location.replace('crew.html'); }, 1200);
            } catch (e) {
                if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                    try {
                        const cred = await createUserWithEmailAndPassword(auth, email, password);
                        const user = cred.user;
                        await setDoc(doc(db, "dispatch_crews", user.uid), {
                            crewId: user.uid,
                            crewName: "Anti-Smog Crew 3",
                            crewType: "CLEANUP_CREW",
                            operationalZone: "ALL",
                            email: email,
                            status: "OFFLINE",
                            latitude: 20.296,
                            longitude: 85.824,
                            assignedIncident: null,
                            lastActive: new Date().toISOString()
                        });
                        showMessage("Logged in as Demo Crew. Redirecting...", false);
                        setTimeout(() => { window.location.replace('crew.html'); }, 1200);
                    } catch (err) {
                        showMessage("Bypass Error: " + err.message);
                        bypassBtn.disabled = false;
                        bypassBtn.innerHTML = originalHTML;
                    }
                } else {
                    showMessage("Bypass Error: " + e.message);
                    bypassBtn.disabled = false;
                    bypassBtn.innerHTML = originalHTML;
                }
            }
        });
    </script>
</body>
</html>
